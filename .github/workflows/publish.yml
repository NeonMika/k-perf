# Publishes KIRHelperKit, k-perf, and instrumentation-overhead-analyzer to Maven Central.
# Triggered when a GitHub Release is created (including pre-releases).
#
# Required repository secrets:
#   MAVEN_CENTRAL_USERNAME      - User token username from central.sonatype.com
#   MAVEN_CENTRAL_PASSWORD      - User token password from central.sonatype.com
#   SIGNING_KEY_ID              - Last 8 characters of the GPG key ID
#   SIGNING_PASSWORD            - Passphrase for the GPG private key
#   GPG_KEY_CONTENTS            - ASCII-armored GPG private key (raw export from Kleopatra)

name: Publish to Maven Central

on:
  release:
    types: [released, prereleased]

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Make all files executable
        run: chmod +x -R ./

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup signing keyring and Gradle properties
        run: |
          printf '%s' "${{ secrets.GPG_KEY_CONTENTS }}" > /tmp/signing-key.asc

          echo "=== Key file content ==="
          cat /tmp/signing-key.asc
          echo "Key file size: $(wc -c < /tmp/signing-key.asc) bytes"
          echo "Key ID: ${{ secrets.SIGNING_KEY_ID }}"
          echo "Maven Central user: ${{ secrets.MAVEN_CENTRAL_USERNAME }}"

          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties << EOF
          signing.keyId=${{ secrets.SIGNING_KEY_ID }}
          signing.password=${{ secrets.SIGNING_PASSWORD }}
          signing.secretKeyRingFile=/tmp/signing-key.asc
          mavenCentralUsername=${{ secrets.MAVEN_CENTRAL_USERNAME }}
          mavenCentralPassword=${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          EOF

      - name: Publish KIRHelperKit
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        working-directory: KIRHelperKit

      - name: Publish k-perf plugin
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        working-directory: plugins/k-perf

      - name: Publish instrumentation-overhead-analyzer plugin
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        working-directory: plugins/instrumentation-overhead-analyzer
