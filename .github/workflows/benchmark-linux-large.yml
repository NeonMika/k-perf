name: Benchmark (Linux, Large)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  benchmark-linux-large:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Make all files executable
        run: chmod +x -R ./

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run k-perf benchmark
        shell: pwsh
        run: |
          Set-Location benchmarking/game-of-life-kmp-k-perf
          ./benchmark.ps1 -CleanBuild $false -RepetitionCount 50 -StepCount 500 `
            -Reference $true -Common $true -Dedicated $false `
            -JVM $true -JS $true -Native $true `
            -Enabled @($true) -FlushEarly @($true, $false) `
            -InstrumentPropertyAccessors @($true, $false) -TestKIR @($false) `
            -Methods @(".*", "step") -CILabel "ci-linux-large"

      - name: Commit and push benchmark results
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add measurements/
          $changes = git status --porcelain
          if ($changes) {
            git commit -m "Add benchmark results [linux-large] [skip ci]"
            $branch = $env:GITHUB_REF_NAME
            git checkout -- .
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              git pull --rebase origin $branch
              git push origin HEAD:refs/heads/$branch
              if ($LASTEXITCODE -eq 0) { break }
              Write-Host "Push attempt $attempt failed, retrying in $($attempt * 5)s..."
              Start-Sleep -Seconds ($attempt * 5)
            }
          } else {
            Write-Host "No benchmark results to commit."
          }
