# Envoy as a gRPC-Web <-> native gRPC translator in front of Jaeger.
#
# Why this exists: kmp-grpc's Kotlin/JS target speaks gRPC-Web (gRPC framed
# over HTTP/1.1, the only dialect a JS fetch-based client can produce), but
# Jaeger's OTLP endpoint on :4317 only speaks native gRPC over HTTP/2. Without
# a translator every JS export fails with
#   "HTTPParserError: Response does not match the HTTP/1.1 protocol".
#
# Envoy's grpc_web filter is transparent for native gRPC traffic: requests
# with content-type application/grpc-web* get transcoded, everything else
# (JVM/Native clients speaking real gRPC) passes through untouched. So the
# benchmark publishes THIS listener on host port 4317 and runs Jaeger behind
# it on the otel-net docker network; all platforms keep using localhost:4317.
#
# Used by benchmarking/kperf-otel-comparison.ps1 (mounted to
# /etc/envoy/envoy.yaml in the envoy container).
static_resources:
  listeners:
    - name: grpc_ingress
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 4317
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                # AUTO accepts both HTTP/1.1 (gRPC-Web from JS) and HTTP/2
                # (native gRPC from JVM/Native) on the same port.
                codec_type: AUTO
                stat_prefix: grpc_ingress
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: jaeger_backend
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: jaeger_grpc
                            # disable route timeout — export batches can be
                            # large and bursty during benchmark runs
                            timeout: 0s
                http_filters:
                  - name: envoy.filters.http.grpc_web
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # OTLP/HTTP ingress for the JSON `otel` variant. Previously this variant
    # posted straight to Jaeger's :4318 (bypassing Envoy), and the fast JVM
    # client's fire-and-forget HTTP/1.1 storm (one connection per POST)
    # overran Jaeger's accept backlog -> "ConnectException" on ~42 % of POSTs
    # -> ~42 % span loss (run 2026-06-10 20:40). Fronting :4318 with Envoy
    # shields Jaeger: Envoy absorbs the high downstream connection count and
    # proxies over a BOUNDED, keep-alive upstream pool (see jaeger_http
    # circuit breakers). Plain HTTP passthrough — Envoy doesn't parse OTLP.
    - name: http_ingress
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 4318
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: AUTO
                stat_prefix: http_ingress
                route_config:
                  name: otlp_http_route
                  virtual_hosts:
                    - name: jaeger_http_backend
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: jaeger_http
                            timeout: 0s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
    - name: jaeger_grpc
      connect_timeout: 5s
      type: LOGICAL_DNS
      lb_policy: ROUND_ROBIN
      # Circuit breakers: the proto exporters are fire-and-forget — the dcxp
      # BatchSpanProcessor hands every batch to export() and gets an immediate
      # ofSuccess(), so all ~4,276 batches/run are launched near-concurrently
      # with zero backpressure. Envoy's DEFAULT circuit-breaker thresholds
      # (max_connections / max_pending_requests / max_requests = 1024 each)
      # are blown instantly under that burst, and excess requests are rejected
      # upstream with "UNAVAILABLE ... reset reason: overflow" (observed on
      # every JVM/Native proto run before this block existed). Raise all
      # thresholds far above the per-run batch count so the burst queues at
      # Envoy instead of being dropped. This adds latency on the async export
      # path only — it does NOT touch the measured per-method hot path.
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 1000000
            max_pending_requests: 1000000
            max_requests: 1000000
            max_retries: 1000
          - priority: HIGH
            max_connections: 1000000
            max_pending_requests: 1000000
            max_requests: 1000000
            max_retries: 1000
      # Upstream is native gRPC -> must use HTTP/2. max_concurrent_streams is
      # raised so Envoy multiplexes the whole batch burst over its upstream
      # connection(s) to Jaeger without serialising them.
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options:
              max_concurrent_streams: 2147483647
      load_assignment:
        cluster_name: jaeger_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      # resolves via docker DNS on the otel-net network
                      address: jaeger
                      port_value: 4317

    # Upstream for the OTLP/HTTP (JSON) variant. The whole point of fronting
    # :4318 with Envoy is to BOUND how many connections Jaeger sees, so
    # max_connections is deliberately small (512) — Envoy keep-alives that pool
    # and reuses it, while max_pending_requests is huge so the burst QUEUES at
    # Envoy instead of being rejected or hammering Jaeger. HTTP/1.1 upstream
    # (no http2_protocol_options) matches Jaeger's OTLP/HTTP endpoint.
    - name: jaeger_http
      connect_timeout: 5s
      type: LOGICAL_DNS
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 512
            max_pending_requests: 1000000
            max_requests: 1000000
            max_retries: 1000
      load_assignment:
        cluster_name: jaeger_http
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      # resolves via docker DNS on the otel-net network
                      address: jaeger
                      port_value: 4318
